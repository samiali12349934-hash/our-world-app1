<!DOCTYPE html>
<html>
<head>
<title>Nature - Our World App</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="top-profile" id="topProfile" style="display:none;">
  <img id="smallAvatar" onclick="goAccount()">
  <span id="smallName"></span>
</div>

<script>
function goAccount(){
  window.location.href="account.html";
}

window.onload = function(){
  if(localStorage.getItem("loggedIn")==="true"){
    document.getElementById("topProfile").style.display="flex";
    document.getElementById("smallAvatar").src =
      localStorage.getItem("avatar");
    document.getElementById("smallName").innerText =
      localStorage.getItem("user");
  }
}
</script>
<header>🌿 Plants & Wild Animals</header>

<nav>
  <a href="index.html">Home</a>
  <a href="climate.html">Climate</a>
  <a href="pollution.html">Pollution</a>
  <a href="countries.html">Countries</a>
  <a href="quiz.html">Quiz</a>
  <a href="account.html">Account</a>
</nav>

<div class="section-box">
<h2>Plants</h2>
<p>Provide oxygen, food, medicine, and habitat for animals.</p>
<img class="float-img" src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Rainforest_Plants.jpg" alt="Plants">
</div>

<div class="section-box">
<h2>Wild Animals</h2>
<p>Maintain ecosystem balance, pollination, seed dispersal, and pest control.</p>
<img class="float-img" src="https://upload.wikimedia.org/wikipedia/commons/2/2c/African_Elephant.jpg" alt="Wild Animals">
</div>

</body>
</html>
