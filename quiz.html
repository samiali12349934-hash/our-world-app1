<body>

<header>📝 Quiz: Our World</header>

<nav>

<div class="section-box">
<h2>Question 1: What gas causes global warming?</h2>
<button onclick="checkAnswer(this,true)">CO₂</button>
<button onclick="checkAnswer(this,false)">O₂</button>
<button onclick="checkAnswer(this,false)">N₂</button>
</div>

<div class="section-box">
<h2>Question 2: What is deforestation?</h2>
<button onclick="checkAnswer(this,true)">Cutting down trees</button>
<button onclick="checkAnswer(this,false)">Planting trees</button>
<button onclick="checkAnswer(this,false)">Cleaning rivers</button>
</div>

<div id="scoreboard" class="section-box">
Score: <span id="score">0</span>
</div>

<script>
let score=0;
function checkAnswer(btn,correct){
  if(correct){ score+=1; btn.style.background="green"; }
  else { btn.style.background="red"; }
  document.getElementById("score").innerText=score;
  setTimeout(()=>{btn.style.background="darkred"},800);
}
</script>

</body>
</html>
<!-- Background Music Panel -->
<div style="position:fixed;bottom:10px;right:10px;background:rgba(0,0,0,0.5);padding:10px;border-radius:10px;">
  <audio id="bgMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  </audio>
  <button onclick="toggleMusic()">🎵 Play/Pause Music</button>
</div>

<!-- Theme Switcher -->
<div style="position:fixed;bottom:10px;left:10px;background:rgba(0,0,0,0.5);padding:10px;border-radius:10px;">
  <button onclick="toggleTheme()">🌙 Dark/Light Mode</button>
  <input type="color" id="bgColorPicker" onchange="changeBgColor(this.value)" title="Change Background Color">
</div>
