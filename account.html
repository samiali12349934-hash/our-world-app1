<!DOCTYPE html>
<html>
<head>
<title>Account Center</title>
<link rel="stylesheet" href="style.css">
<style>
.account-box{
  width:400px;
  margin:50px auto;
  background:white;
  color:black;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.account-box input{
  width:90%;
  padding:10px;
  margin:10px 0;
}

.account-box button{
  padding:10px 20px;
  background:#0072ff;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

#profile{
  display:none;
  text-align:center;
}

#profile img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
}
</style>
</head>
<body>

<h1>👤 Account Center</h1>

<div class="account-box" id="registerBox">
<h2>Sign Up</h2>
<input type="text" id="username" placeholder="Username">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<input type="file" id="avatarInput">
<br>
<button onclick="register()">Create Account</button>
</div>

<div class="account-box" id="loginBox">
<h2>Login</h2>
<input type="text" id="loginUser" placeholder="Username">
<input type="password" id="loginPass" placeholder="Password">
<br>
<button onclick="login()">Login</button>
</div>

<div class="account-box" id="profile">
<h2>Your Profile</h2>
<img id="avatarPreview">
<p id="profileName"></p>
<p id="profileEmail"></p>
<button onclick="logout()">Logout</button>
</div>

<script>
<h1>🌍 Major Environmental Problems</h1>

<p>
The world faces many environmental problems that affect humans,
animals, plants, and oceans. These problems are increasing every year.
We must understand them and work together to solve them.
</p>

<h2>🌡 Global Warming</h2>
<img src="https://upload.wikimedia.org/wikipedia/commons/0/09/Global_Warming_Map.jpg" width="450">
<p>
Global warming is the increase in Earth's temperature.
It is caused by harmful gases from cars and factories.
These gases trap heat in the atmosphere.
It causes melting ice in the Arctic.
Sea levels rise and may flood cities.
Weather becomes more extreme.
Some places become very hot.
Other places experience heavy storms.
Climate patterns change worldwide.
Reducing pollution helps stop global warming.
</p>

<h2>🏭 Pollution</h2>
<img src="https://upload.wikimedia.org/wikipedia/commons/7/7b/Factory_pollution.jpg" width="450">
<p>
Pollution harms air, water, and soil.
Air pollution comes from smoke and gases.
Water pollution comes from waste and chemicals.
Soil pollution happens from trash and chemicals.
Pollution causes diseases.
It harms animals and plants.
Plastic waste kills marine life.
Factories produce harmful emissions.
Reducing waste can help.
Recycling is very important.
</p>

<h2>🌲 Deforestation</h2>
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Deforestation_in_Borneo.jpg" width="450">
<p>
Deforestation means cutting down forests.
Trees produce oxygen.
Forests protect animals.
Cutting trees increases global warming.
Animals lose homes.
Rainfall decreases.
Soil becomes weak.
Farming destroys forests.
Planting trees helps.
Forests must be protected.
</p>

<h2>💧 Water Shortage</h2>
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3b/Drought_in_Somalia.jpg" width="450">
<p>
Water shortage means not enough clean water.
Drought reduces water supply.
Climate change makes it worse.
People need water for drinking.
Farmers need water for crops.
Without water, diseases spread.
Water pollution reduces clean water.
Saving water is important.
Building wells helps communities.
Water conservation protects the future.
</p>

<h2>🌱 Soil Degradation</h2>
<img src="https://upload.wikimedia.org/wikipedia/commons/2/24/Soil_erosion.jpg" width="450">
<p>
Soil degradation makes soil poor.
Over-farming removes nutrients.
Chemicals damage land.
Soil erosion removes topsoil.
Crops grow poorly.
Food production decreases.
Farmers lose income.
Planting trees protects soil.
Better farming helps.
Healthy soil is important for life.
</p>

<p>
All environmental problems affect the whole world.
People must work together to protect Earth.
</p>
</script>

</body>
</html>
