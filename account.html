<div class="section-box">
<h2>User Profile</h2>
<p>Username: <span id="username">Guest</span></p>
<p>Avatar: <img id="avatar" src="https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png" width="100"></p>
<input type="text" id="newName" placeholder="Enter new username">
<button onclick="changeName()">Save Name</button>
</div>

<script>
function changeName(){
  let name=document.getElementById("newName").value;
  if(name){ document.getElementById("username").innerText=name; }
}
</script>

</body>

<!-- Background Music Panel -->
<div style="position:fixed;bottom:10px;right:10px;background:rgba(0,0,0,0.5);padding:10px;border-radius:10px;">
  <audio id="bgMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  </audio>
  <button onclick="toggleMusic()">🎵 Play/Pause Music</button>
</div>

<!-- Theme Switcher -->
<div style="position:fixed;bottom:10px;left:10px;background:rgba(0,0,0,0.5);padding:10px;border-radius:10px;">
  <button onclick="toggleTheme()">🌙 Dark/Light Mode</button>
  <input type="color" id="bgColorPicker" onchange="changeBgColor(this.value)" title="Change Background Color">
</div>

<script src="script.js"></script>
