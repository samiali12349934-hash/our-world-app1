<!-- Chat Box Placeholder -->
<div style="
  position:fixed;
  bottom:20px;
  right:20px;
  width:250px;
  height:300px;
  background:#222;
  color:white;
  border-radius:15px;
  padding:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.4);
">
  <h4 style="text-align:center;">Chat</h4>
  <div id="chatMessages" style="height:200px; overflow-y:auto; border:1px solid #555; padding:5px; margin-bottom:5px;"></div>
  <input type="text" id="chatInput" placeholder="Type..." style="width:80%; padding:5px;">
  <button onclick="sendChat()" style="width:18%; padding:5px;">Send</button>
</div>

<script>
function sendChat() {
  const input = document.getElementById("chatInput");
  if(input.value.trim() !== ""){
    const div = document.createElement("div");
    div.innerText = "You: " + input.value;
    document.getElementById("chatMessages").appendChild(div);
    input.value = "";
    document.getElementById("chatMessages").scrollTop = document.getElementById("chatMessages").scrollHeight;
  }
}
</script>
