<!DOCTYPE html>
<html>
<head>
<title>Chat - Our World App</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="top-profile" id="topProfile" style="display:none;">
  <img id="smallAvatar" onclick="goAccount()">
  <span id="smallName"></span>
</div>

<script>
function goAccount(){
  window.location.href="account.html";
}

window.onload = function(){
  if(localStorage.getItem("loggedIn")==="true"){
    document.getElementById("topProfile").style.display="flex";
    document.getElementById("smallAvatar").src =
      localStorage.getItem("avatar");
    document.getElementById("smallName").innerText =
      localStorage.getItem("user");
  }
}
</script>
<header>💬 Chat Box</header>

<nav>
  <a href="index.html">Home</a>
  <a href="climate.html">Climate</a>
  <a href="pollution.html">Pollution</a>
  <a href="nature.html">Nature</a>
  <a href="countries.html">Countries</a>
  <a href="quiz.html">Quiz</a>
  <a href="account.html">Account</a>
</nav>

<div class="section-box">
<textarea id="chatInput" placeholder="Type a message..." rows="3" style="width:100%"></textarea>
<button onclick="sendMsg()">Send</button>
<ul id="chatBox"></ul>
</div>

<script>
function sendMsg(){
  let msg=document.getElementById("chatInput").value;
  if(msg){
    let li=document.createElement("li");
    li.innerText=msg;
    document.getElementById("chatBox").appendChild(li);
    document.getElementById("chatInput").value="";
  }
}
</script>

</body>
</html>
<!-- Background Music Panel -->
<div style="position:fixed;bottom:10px;right:10px;background:rgba(0,0,0,0.5);padding:10px;border-radius:10px;">
  <audio id="bgMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  </audio>
  <button onclick="toggleMusic()">🎵 Play/Pause Music</button>
</div>

<!-- Theme Switcher -->
<div style="position:fixed;bottom:10px;left:10px;background:rgba(0,0,0,0.5);padding:10px;border-radius:10px;">
  <button onclick="toggleTheme()">🌙 Dark/Light Mode</button>
  <input type="color" id="bgColorPicker" onchange="changeBgColor(this.value)" title="Change Background Color">
</div>

<script src="script.js"></script>
